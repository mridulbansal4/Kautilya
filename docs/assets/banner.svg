<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050510"/>
            <stop offset="50%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#050510"/>
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#60a5fa"/>
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>
        </pattern>
        <filter id="glow">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="1200" height="400" fill="url(#bg)"/>
    <rect width="1200" height="400" fill="url(#grid)"/>
    
    <!-- Abstract Nodes/Graph for Banking Connections -->
    <g stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5">
        <line x1="100" y1="150" x2="250" y2="80" />
        <line x1="250" y1="80" x2="350" y2="200" />
        <line x1="350" y1="200" x2="150" y2="300" />
        <line x1="350" y1="200" x2="500" y2="100" />
        <line x1="500" y1="100" x2="650" y2="250" />
        <line x1="650" y1="250" x2="800" y2="120" />
        <line x1="800" y1="120" x2="950" y2="220" />
        <line x1="950" y1="220" x2="1100" y2="100" />
        <line x1="950" y1="220" x2="1050" y2="350" />
        <line x1="800" y1="120" x2="850" y2="50" />
        <line x1="650" y1="250" x2="700" y2="350" />
    </g>
    
    <!-- Nodes -->
    <g fill="#60a5fa" filter="url(#glow)">
        <circle cx="100" cy="150" r="4" />
        <circle cx="250" cy="80" r="6" />
        <circle cx="150" cy="300" r="5" />
        <circle cx="350" cy="200" r="8" />
        <circle cx="500" cy="100" r="5" />
        <circle cx="650" cy="250" r="7" />
        <circle cx="800" cy="120" r="9" />
        <circle cx="950" cy="220" r="6" />
        <circle cx="1100" cy="100" r="5" />
        <circle cx="1050" cy="350" r="4" />
        <circle cx="850" cy="50" r="3" />
        <circle cx="700" cy="350" r="5" />
    </g>
    
    <!-- Logo Symbol (Geometric K) -->
    <g transform="translate(540, 80)">
        <path d="M0,0 L20,0 L20,100 L0,100 Z" fill="url(#accent)"/>
        <path d="M20,50 L60,0 L80,0 L35,50 L85,100 L60,100 Z" fill="url(#accent)"/>
    </g>
    
    <!-- Text -->
    <text x="600" y="240" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="10">KAUTILYA</text>
    <text x="600" y="290" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="20" fill="#94a3b8" text-anchor="middle" letter-spacing="4">ENTERPRISE DECISION INTELLIGENCE</text>
    
    <g transform="translate(500, 320)">
        <rect width="200" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
        <text x="100" y="21" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#38bdf8" text-anchor="middle" letter-spacing="1.5">INTEGRATED WITH YONO</text>
    </g>
</svg>
